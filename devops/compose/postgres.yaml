version: "3.9"

services:
  postgres:
    image: postgres:14.1-alpine
    restart: no

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresPass
      POSTGRES_DB: dough_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
